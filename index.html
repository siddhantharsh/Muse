<!DOCTYPE html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="theme-color" content="#2E3440" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <link rel="manifest" href="/manifest.json" />
    <link rel="apple-touch-icon" href="/icon-256.png" />
    <title>muse — autonomous task scheduler</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
    <style>
      html, body, #root {
        height: 100%;
        margin: 0;
        padding: 0;
        overflow: hidden;
        background: #2E3440;
        color: #ECEFF4;
        font-family: 'JetBrains Mono', 'Fira Code', 'Cascadia Code', monospace;
      }
      #root {
        zoom: 1.2;
      }
      /* On mobile / non-Electron browsers, remove zoom */
      @media (max-width: 768px) {
        #root {
          zoom: 1;
        }
      }
      /* Terminal-style scrollbar */
      ::-webkit-scrollbar { width: 8px; height: 8px; }
      ::-webkit-scrollbar-track { background: var(--scrollbar-track, #2E3440); }
      ::-webkit-scrollbar-thumb { background: var(--scrollbar-thumb, #4C566A); border-radius: 0; }
      ::-webkit-scrollbar-thumb:hover { background: var(--muse-border-light, #5a657a); }
      ::-webkit-scrollbar-corner { background: var(--scrollbar-track, #2E3440); }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
